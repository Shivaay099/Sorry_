<!DOCTYPE html>
<html>
<head>
<title>I’m Sorry ❤️</title>

<style>
body{
background: pink;
font-family: Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.card{
background:white;
padding:40px;
border-radius:20px;
width:80%;
max-width:600px;
text-align:center;
box-shadow:0 0 20px rgba(0,0,0,0.2);
}

h1{
color:red;
}

button{
padding:12px 25px;
border:none;
background:red;
color:white;
border-radius:30px;
cursor:pointer;
font-size:16px;
}

button:hover{
transform:scale(1.05);
}
</style>
</head>

<body>

<div class="card">
<h1>I’m Sorry ❤️</h1>

<p>
I know I made mistakes and hurt you.
But trust me, I never wanted to become the reason behind your sadness.
</p>

<p>
You matter a lot to me.
And I genuinely hope someday you can forgive me.
</p>

<button onclick="showMessage()">
Forgive Me?
</button>

</div>

<script>
function showMessage(){
alert("Thank you for reading this ❤️");
}
</script>

</body>
</html>
