<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sorry ❤️</title>

<style>

body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#ffdce5;
    font-family:Arial, sans-serif;
    overflow:hidden;
}

.container{
    text-align:center;
}

/* PANDA */

.panda{
    position:relative;
    width:320px;
    height:350px;
    margin:auto;
}

/* EARS */

.ear1,.ear2{
    width:70px;
    height:70px;
    background:black;
    border-radius:50%;
    position:absolute;
    top:10px;
}

.ear1{
    left:55px;
}

.ear2{
    right:55px;
}

/* FACE */

.face{
    width:240px;
    height:220px;
    background:white;
    border-radius:50%;
    position:absolute;
    top:40px;
    left:40px;
}

/* EYES */

.eye1,.eye2{
    width:45px;
    height:60px;
    background:black;
    border-radius:50%;
    position:absolute;
    top:80px;
}

.eye1{
    left:60px;
}

.eye2{
    right:60px;
}

.eye1::after,
.eye2::after{
    content:'';
    width:14px;
    height:14px;
    background:white;
    border-radius:50%;
    position:absolute;
    top:12px;
    left:12px;
}

/* BLUSH */

.blush1,.blush2{
    width:28px;
    height:18px;
    background:#ffb3c7;
    border-radius:50%;
    position:absolute;
    top:140px;
}

.blush1{
    left:45px;
}

.blush2{
    right:45px;
}

/* NOSE */

.nose{
    width:18px;
    height:14px;
    background:black;
    border-radius:50%;
    position:absolute;
    top:125px;
    left:111px;
}

/* MOUTH */

.mouth{
    position:absolute;
    top:145px;
    left:108px;
    font-size:20px;
}

/* HEART */

.heart{
    position:absolute;
    bottom:10px;
    left:50%;
    transform:translateX(-50%) rotate(-45deg);
    width:160px;
    height:160px;
    background:#ff5c8a;
}

.heart::before,
.heart::after{
    content:'';
    position:absolute;
    width:160px;
    height:160px;
    background:#ff5c8a;
    border-radius:50%;
}

.heart::before{
    top:-80px;
    left:0;
}

.heart::after{
    left:80px;
    top:0;
}

/* HEART TEXT */

.sorry{
    position:absolute;
    z-index:10;
    color:white;
    font-size:34px;
    font-weight:bold;
    top:60px;
    left:28px;
    transform:rotate(45deg);
}

/* HANDS */

.hand1,.hand2{
    width:45px;
    height:70px;
    background:black;
    border-radius:30px;
    position:absolute;
    top:170px;
    z-index:20;
}

.hand1{
    left:65px;
    transform:rotate(-20deg);
}

.hand2{
    right:65px;
    transform:rotate(20deg);
}

/* LEGS */

.leg1,.leg2{
    width:70px;
    height:70px;
    background:black;
    border-radius:50%;
    position:absolute;
    bottom:0;
}

.leg1{
    left:60px;
}

.leg2{
    right:60px;
}

/* PAWS */

.paw1,.paw2{
    width:28px;
    height:28px;
    background:#ffb3c7;
    border-radius:50%;
    position:absolute;
    bottom:20px;
}

.paw1{
    left:82px;
}

.paw2{
    right:82px;
}

/* BUTTONS */

.buttons{
    margin-top:40px;
}

button{
    padding:15px 30px;
    border:none;
    border-radius:40px;
    margin:10px;
    font-size:20px;
    cursor:pointer;
    transition:0.3s;
}

.forgive{
    background:#ff4f87;
    color:white;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.not{
    background:white;
    color:#ff4f87;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

button:hover{
    transform:scale(1.08);
}

.message{
    margin-top:25px;
    font-size:28px;
    font-weight:bold;
    color:#ff4f87;
}

</style>
</head>

<body>

<div class="container">

    <div class="panda">

        <div class="ear1"></div>
        <div class="ear2"></div>

        <div class="face">

            <div class="eye1"></div>
            <div class="eye2"></div>

            <div class="blush1"></div>
            <div class="blush2"></div>

            <div class="nose"></div>

            <div class="mouth">◡</div>

        </div>

        <div class="hand1"></div>
        <div class="hand2"></div>

        <div class="heart">
            <div class="sorry">Sorry</div>
        </div>

        <div class="leg1"></div>
        <div class="leg2"></div>

        <div class="paw1"></div>
        <div class="paw2"></div>

    </div>

    <div class="buttons">

        <button class="forgive" onclick="forgive()">
            Forgive 🥺
        </button>

        <button class="not" onclick="notForgive()">
            Not Forgive 😔
        </button>

    </div>

    <div class="message" id="message"></div>

</div>

<script>

function forgive(){
    document.getElementById("message").innerHTML =
    "Thank You 💖";
}

function notForgive(){
    document.getElementById("message").innerHTML =
    "Please Forgive !!";
}

</script>

</body>
</html>
